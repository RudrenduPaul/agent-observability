name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ benchmarks/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/ benchmarks/

      - name: Type check (mypy)
        run: uv run mypy src/ --strict

      - name: Unit tests (overall ≥ 80%)
        run: uv run pytest tests/unit/ --cov=src/ --cov-report=xml --cov-fail-under=80 -v
        env:
          AGENT_TRACE_NETWORK_GUARD: "1"

      - name: Coverage gate — replay/ and interceptor/ each ≥ 90%
        run: |
          uv run pytest tests/unit/ \
            --cov=src/agent_trace/_replay \
            --cov=src/agent_trace/interceptor \
            --cov-fail-under=90 \
            -q --no-header
        env:
          AGENT_TRACE_NETWORK_GUARD: "1"

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  cross-platform-tests:
    name: tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Unit tests
        shell: bash
        run: uv run pytest tests/unit/ -v
        env:
          AGENT_TRACE_NETWORK_GUARD: "1"
